substitutions:
  devicename: esphome-wmbus-heltec-v2
  friendly_name: "wMBus Bridge Heltec V2"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  variant: ESP32
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
time:
  - platform: homeassistant

debug:

spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

# Optional status LED on Heltec V2.
# output:
#   - platform: gpio
#     id: led_output
#     pin: GPIO25
# light:
#   - platform: binary
#     id: status_led
#     name: "LED"
#     output: led_output
#     restore_mode: ALWAYS_OFF
# script:
#   - id: blink_led
#     mode: single
#     then:
#       - light.turn_on: status_led
#       - delay: 50ms
#       - light.turn_off: status_led

wmbus_radio:
  radio_type: SX1276
  cs_pin: GPIO18
  reset_pin: GPIO14

  # SX1276 driver uses DIO1/FifoLevel as IRQ, not DIO0/RxDone.
  irq_pin:
    number: GPIO35
    mode: input

  listen_mode: t1
  sx1276_busy_ether_mode: adaptive
  telegram_topic: "wmbus_bridge/heltec_v2/telegram"

  diagnostic_mode: low
  diagnostic_topic: "wmbus/heltec_v2/diag"
  diagnostic_summary_interval: 60s

  # Optional: avoid SX1276 both mode in dense mixed T1/C1 environments.
  # Use two devices instead: one T1-only and one C1-only.

  # Optional highlighted meter logs and filtered packet diagnostics.
  # highlight_meters:
  #   - "12345678"
  # highlight_ansi: true
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # diagnostic_publish_highlight_only: true

  # Optional LED blink if the LED blocks above are enabled.
  # on_frame:
  #   then:
  #     - script.execute: blink_led
