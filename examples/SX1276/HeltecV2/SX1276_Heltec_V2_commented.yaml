# ESPHome wM-Bus Bridge RAW-only — Heltec WiFi LoRa 32 V2 / SX1276
# EN: Commented example. Verify the DIO1/FifoLevel wiring for your board.
# PL: Przykład z komentarzami. Sprawdź połączenie DIO1/FifoLevel dla swojej płytki.

substitutions:
  devicename: esphome-wmbus-heltec-v2
  friendly_name: "wMBus Bridge Heltec V2"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  variant: ESP32
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
time:
  - platform: homeassistant

debug:

spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

wmbus_radio:
  radio_type: SX1276
  cs_pin: GPIO18
  reset_pin: GPIO14

  # EN: SX1276 driver uses DIO1/FifoLevel as IRQ, not DIO0/RxDone.
  # PL: Driver SX1276 używa DIO1/FifoLevel jako IRQ, nie DIO0/RxDone.
  irq_pin:
    number: GPIO35
    mode: input

  # EN: Receive mode. Available values: t1, c1, both, s1.
  #     both means T1/C1 only. S1 is separate and cannot be combined with T1/C1.
  #     Default frequency: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Optional frequency override example for S1 compatibility tests:
  #       frequency: 868.36
  # PL: Tryb odbioru. Dostępne wartości: t1, c1, both, s1.
  #     both oznacza tylko T1/C1. S1 jest osobny i nie łączy się z T1/C1.
  #     Domyślna częstotliwość: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Przykład opcjonalnego nadpisania częstotliwości dla testów S1:
  #       frequency: 868.36
  listen_mode: t1
  listen_mode_filter_after_parse: false

  # MQTT topics are generated automatically.
  # topic_name is optional; if omitted, esphome.name is used.
  # Generated topics:
  #   wmbus/<topic_name>/telegram
  #   wmbus/<topic_name>/diag/...
  # topic_name: "${devicename}"
  sx1276_busy_ether_mode: adaptive


  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  # Optional per-meter stats.
  # highlight_meters:
  #   - "00089907"
  # diagnostic_publish_summary_15min: true
