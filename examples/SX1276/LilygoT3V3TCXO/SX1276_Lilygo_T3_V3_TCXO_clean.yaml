substitutions:
  devicename: esphome-wmbus-lilygo-t3-v3-tcxo
  friendly_name: "wMBus Bridge LilyGO T3 V3 TCXO"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  variant: ESP32
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
time:
  - platform: homeassistant

spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

wmbus_radio:
  radio_type: SX1276
  cs_pin: GPIO7
  reset_pin: GPIO23
  irq_pin:
    number: GPIO32
    mode: input

  tcxo_pin: GPIO12

  listen_mode: t1
  listen_mode_filter_after_parse: false
  sx1276_busy_ether_mode: adaptive

  diagnostic_mode: normal
  diagnostic_summary_interval: 60s
