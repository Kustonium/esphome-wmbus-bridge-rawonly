substitutions:
  devicename: esphome-wmbus-lilygo-t3s3
  friendly_name: "wMBus Bridge LilyGO T3-S3"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
improv_serial:
time:
  - platform: homeassistant

debug:

spi:
  id: spi_lora
  clk_pin: GPIO05
  mosi_pin: GPIO06
  miso_pin: GPIO03

output:
  - platform: gpio
    id: status_led
    pin: GPIO37

wmbus_radio:
  radio_type: SX1276
  spi_id: spi_lora
  cs_pin: GPIO07
  reset_pin: GPIO08

  # SX1276 driver uses DIO1/FifoLevel as IRQ.
  irq_pin:
    number: GPIO33
    mode:
      input: true
      pullup: true

  listen_mode: t1
  sx1276_busy_ether_mode: adaptive
  telegram_topic: "wmbus_bridge/lilygo_t3s3/telegram"

  diagnostic_mode: low
  diagnostic_topic: "wmbus/lilygo_t3s3/diag"
  diagnostic_summary_interval: 60s

  # Optional highlighted meter logs and per-meter windows.
  # highlight_meters:
  #   - "00089907"
  # highlight_ansi: true
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # diagnostic_publish_summary_highlight_meters: true

  on_frame:
    then:
      - output.turn_on: status_led
      - delay: 50ms
      - output.turn_off: status_led
