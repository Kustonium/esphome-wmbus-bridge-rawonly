# ESPHome wM-Bus Bridge RAW-only — LilyGO T3-S3 / SX1276
# EN: Commented example. SX1276 is more sensitive to timing than SX1262.
# PL: Przykład z komentarzami. SX1276 jest bardziej wrażliwy na timing niż SX1262.

substitutions:
  devicename: esphome-wmbus-lilygo-t3s3
  friendly_name: "wMBus Bridge LilyGO T3-S3"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
improv_serial:
time:
  - platform: homeassistant

debug:

spi:
  id: spi_lora
  clk_pin: GPIO05
  mosi_pin: GPIO06
  miso_pin: GPIO03

output:
  - platform: gpio
    id: status_led
    pin: GPIO37

wmbus_radio:
  radio_type: SX1276
  spi_id: spi_lora
  cs_pin: GPIO07
  reset_pin: GPIO08

  # EN: SX1276 driver uses DIO1/FifoLevel as IRQ, not DIO0/RxDone.
  # PL: Driver SX1276 używa DIO1/FifoLevel jako IRQ, nie DIO0/RxDone.
  irq_pin:
    number: GPIO33
    mode:
      input: true
      pullup: true

  # EN: Start with T1-only. both mode has a real cost on SX1276.
  # PL: Zacznij od T1-only. Tryb both ma realny koszt na SX1276.
  listen_mode: t1
  listen_mode_filter_after_parse: false

  # MQTT topics are generated automatically.
  # topic_name is optional; if omitted, esphome.name is used.
  # Generated topics:
  #   wmbus/<topic_name>/telegram
  #   wmbus/<topic_name>/diag/...
  # topic_name: "${devicename}"

  # EN: adaptive is recommended default for dense RF environments.
  # PL: adaptive to zalecany domyślny tryb w gęstym eterze.
  sx1276_busy_ether_mode: adaptive


  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  # Optional per-meter stats for selected IDs.
  # highlight_meters:
  #   - "00089907"
  #   - "03534159"
  # highlight_ansi: true
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # diagnostic_publish_summary_15min: true

  # Optional LED blink on validated frame.
  on_frame:
    then:
      - output.turn_on: status_led
      - delay: 50ms
      - output.turn_off: status_led
