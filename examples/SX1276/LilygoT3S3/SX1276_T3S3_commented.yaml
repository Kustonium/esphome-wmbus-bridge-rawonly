# ESPHome wM-Bus Bridge RAW-only — LilyGO T3-S3 / SX1276
# EN: Commented example. SX1276 is more sensitive to timing than SX1262.
# PL: Przykład z komentarzami. SX1276 jest bardziej wrażliwy na timing niż SX1262.

substitutions:
  devicename: esphome-wmbus-lilygo-t3s3
  friendly_name: "wMBus Bridge LilyGO T3-S3"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  # EN: plain MQTT on 1883; don't enable TLS unless your broker has a valid cert
  #     (a wrong/unknown cert blocks the ESP from connecting).
  # PL: zwykłe MQTT na 1883; nie włączaj TLS bez pewności co do certu brokera
  #     (zły/nieznany cert blokuje połączenie ESP).
  port: 1883
  skip_cert_cn_check: true

api:
ota:
  - platform: esphome
mdns:
  disabled: false
improv_serial:
time:
  - platform: homeassistant

debug:

spi:
  id: spi_lora
  clk_pin: GPIO05
  mosi_pin: GPIO06
  miso_pin: GPIO03

output:
  - platform: gpio
    id: status_led
    pin: GPIO37

wmbus_radio:
  # ─────────────────────────────────────────────────────────────────────────
  # EN: REQUIRED here: radio_type, the board pins (cs/reset/busy/irq — or
  #     gdo0/gdo2 + cc1101_allow_experimental for CC1101), has_tcxo where the
  #     module has a TCXO, and listen_mode. Everything else below is OPTIONAL —
  #     sane defaults apply if you delete it: frequency, rx_gain,
  #     long_gfsk_packets, listen_mode_filter_after_parse, topic_name,
  #     diagnostic_* and highlight_meters.
  # PL: WYMAGANE tutaj: radio_type, piny płytki (cs/reset/busy/irq — lub
  #     gdo0/gdo2 + cc1101_allow_experimental dla CC1101), has_tcxo gdy moduł ma
  #     TCXO, oraz listen_mode. Cała reszta poniżej jest OPCJONALNA — po
  #     usunięciu działają sensowne domyślne: frequency, rx_gain,
  #     long_gfsk_packets, listen_mode_filter_after_parse, topic_name,
  #     diagnostic_* oraz highlight_meters.
  # ─────────────────────────────────────────────────────────────────────────
  radio_type: SX1276
  spi_id: spi_lora
  cs_pin: GPIO07
  reset_pin: GPIO08

  # EN: SX1276 driver uses DIO1/FifoLevel as IRQ, not DIO0/RxDone.
  # PL: Driver SX1276 używa DIO1/FifoLevel jako IRQ, nie DIO0/RxDone.
  irq_pin:
    number: GPIO33
    mode:
      input: true
      pullup: true

  # EN: Receive mode. Available values: t1, c1, both, s1.
  #     both means T1/C1 only. S1 is separate and cannot be combined with T1/C1.
  #     Default frequency: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Optional frequency override example for S1 compatibility tests:
  #       frequency: 868.36
  # PL: Tryb odbioru. Dostępne wartości: t1, c1, both, s1.
  #     both oznacza tylko T1/C1. S1 jest osobny i nie łączy się z T1/C1.
  #     Domyślna częstotliwość: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Przykład opcjonalnego nadpisania częstotliwości dla testów S1:
  #       frequency: 868.36
  listen_mode: t1
  listen_mode_filter_after_parse: false

  # MQTT topics are generated automatically.
  # topic_name is optional; if omitted, esphome.name is used.
  # Generated topics:
  #   wmbus/<topic_name>/telegram
  #   wmbus/<topic_name>/diag/...
  # topic_name: "${devicename}"

  # EN: adaptive is recommended default for dense RF environments.
  # PL: adaptive to zalecany domyślny tryb w gęstym eterze.
  sx1276_busy_ether_mode: adaptive


  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  # Optional per-meter stats for selected IDs.
  # highlight_meters:
  #   - "00089907"
  #   - "03534159"
  # highlight_ansi: true
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # diagnostic_publish_summary_15min: true

  # Optional LED blink on validated frame.
  on_frame:
    then:
      - output.turn_on: status_led
      - delay: 50ms
      - output.turn_off: status_led
