# =============================================================================
# ESPHome wM-Bus Bridge RAW-only / CC1101 EXPERIMENTAL
# EN: Commented example for advanced/testing use.
# PL: Przykład z komentarzami do zastosowań zaawansowanych/testowych.
#
# EN: Data path:
#     radio -> component validation -> MQTT -> wmbusmeters -> JSON/HA entities
# PL: Tor danych:
#     radio -> walidacja w komponencie -> MQTT -> wmbusmeters -> JSON/encje HA
#
# EN: CC1101 support is experimental and requires explicit opt-in.
#     This component intentionally requires two lines: GDO2 + GDO0.
#     Single-IRQ CC1101 wiring is not supported.
# PL: Obsługa CC1101 jest eksperymentalna i wymaga jawnego włączenia.
#     Komponent celowo wymaga dwóch linii: GDO2 + GDO0.
#     Konfiguracja CC1101 z jednym IRQ nie jest obsługiwana.
# =============================================================================

substitutions:
  devicename: esphome-wmbus-cc1101
  friendly_name: "wMBus Bridge CC1101"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn
    wmbus: info

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  # EN: plain MQTT on 1883; don't enable TLS unless your broker has a valid cert
  #     (a wrong/unknown cert blocks the ESP from connecting).
  # PL: zwykłe MQTT na 1883; nie włączaj TLS bez pewności co do certu brokera
  #     (zły/nieznany cert blokuje połączenie ESP).
  port: 1883
  skip_cert_cn_check: true

  # EN: Optional ESPHome logs over MQTT. For first CC1101 tests, USB/API logs are usually clearer.
  # PL: Opcjonalne logi ESPHome przez MQTT. Przy pierwszych testach CC1101 zwykle lepszy jest log USB/API.
  # log_topic:
  #   topic: "${devicename}/debug"
  #   level: DEBUG

api:
ota:
  - platform: esphome
mdns:
  disabled: false
time:
  - platform: homeassistant

# =============================================================================
# SPI BUS / MAGISTRALA SPI – example for ESP32-C3 Super Mini / DevKitM
#
# CC1101        ESP32-C3
# ----------------------
# GND       ->  GND
# VCC       ->  3V3
# GDO0      ->  GPIO3
# CSN       ->  GPIO4
# SCK       ->  GPIO5
# MOSI      ->  GPIO6
# MISO/GDO1 ->  GPIO7
# GDO2      ->  GPIO2
# =============================================================================
spi:
  clk_pin: GPIO5
  mosi_pin: GPIO6
  miso_pin: GPIO7

# =============================================================================
# WMBUS RADIO – CC1101 EXPERIMENTAL
# =============================================================================
wmbus_radio:
  radio_type: CC1101

  # EN: Required safety gate. Without this option CC1101 fails validation by design.
  # PL: Wymagana bramka bezpieczeństwa. Bez tej opcji CC1101 celowo nie przejdzie walidacji.
  cc1101_allow_experimental: true

  # EN: Optional frequency override in MHz.
  #     T1/C1/both default: 868.950 MHz.
  #     S1 default: 868.300 MHz.
  #     Keep this only if you intentionally want a fixed/manual value.
  # PL: Opcjonalne ręczne ustawienie częstotliwości w MHz.
  #     Domyślnie T1/C1/both: 868.950 MHz.
  #     Domyślnie S1: 868.300 MHz.
  #     Zostaw tylko wtedy, gdy świadomie chcesz wartość ręczną.
  frequency: 868.950

  cs_pin: GPIO4

  # EN: CC1101 requires both lines:
  #     GDO2 = sync detection / start of telegram,
  #     GDO0 = FIFO threshold / FIFO data event.
  #     Do not use irq_pin/reset_pin/busy_pin for CC1101 in this component.
  # PL: CC1101 wymaga obu linii:
  #     GDO2 = sync detect / początek telegramu,
  #     GDO0 = FIFO threshold / dane w FIFO.
  #     Dla CC1101 w tym komponencie nie używaj irq_pin/reset_pin/busy_pin.
  gdo0_pin:
    number: GPIO3
    mode: input

  gdo2_pin:
    number: GPIO2
    mode: input

  # EN: Receive mode. Available values: t1, c1, both, s1.
  #     both means T1/C1 only. S1 is separate and cannot be combined with T1/C1.
  # PL: Tryb odbioru. Dostępne wartości: t1, c1, both, s1.
  #     both oznacza tylko T1/C1. S1 jest osobny i nie łączy się z T1/C1.
  listen_mode: t1

  # EN: Conservative/stable mode. Set true only for targeted experiments.
  # PL: Tryb konserwatywny/stabilny. Ustaw true tylko do celowych testów.
  listen_mode_filter_after_parse: false

  # EN: New automatic MQTT topic model.
  #     Generated topics:
  #       wmbus/cc1101/telegram
  #       wmbus/cc1101/diag
  #       wmbus/cc1101/diag/summary
  #       wmbus/cc1101/diag/meter_snapshot
  # PL: Nowy automatyczny model topiców MQTT.
  #     Generowane topiki:
  #       wmbus/cc1101/telegram
  #       wmbus/cc1101/diag
  #       wmbus/cc1101/diag/summary
  #       wmbus/cc1101/diag/meter_snapshot
  topic_name: "cc1101"

  # EN: Diagnostic preset. For normal use this gives summary + 15min summary + highlighted meter snapshots.
  # PL: Preset diagnostyczny. Dla normalnej pracy daje summary + summary 15 min + snapshot wyróżnionych liczników.
  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  # EN: Optional selected meters for meter_snapshot in diagnostic_mode: normal.
  # PL: Opcjonalne wyróżnione liczniki do meter_snapshot w diagnostic_mode: normal.
  # highlight_meters:
  #   - "12345678"
  #   - "87654321"
