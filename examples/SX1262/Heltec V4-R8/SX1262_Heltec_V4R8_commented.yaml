# ESPHome wM-Bus Bridge RAW-only — Heltec WiFi LoRa 32 V4-R8 / SX1262
# EN: Commented example. Derived from the "Heltec V4" (V4.2) example. R8 uses
#     ESP32-S3R8 (8 MB octal PSRAM) and the KCT8103L front-end (V4.2 = GC1109).
#     Per Heltec's driver (board-config.h / radio.c) the RAW-only receiver delta
#     vs V4.2 is: fem_pa_pin 46 -> 5 and the LED pin 35 -> 46. fem_en/fem_ctrl
#     unchanged. STATUS: validated against Heltec's driver source, NOT yet
#     flashed on physical R8. If it boots but hears nothing at good RSSI,
#     fem_pa_pin is the first suspect (KCT8103L != GC1109).
# PL: Przykład z komentarzami. Pochodzi od przykładu "Heltec V4" (V4.2). R8 to
#     ESP32-S3R8 (8 MB octal PSRAM) i front-end KCT8103L (V4.2 = GC1109). Wg
#     sterownika Helteca delta odbiornika RAW-only vs V4.2 to: fem_pa_pin 46 -> 5
#     oraz pin LED 35 -> 46. fem_en/fem_ctrl bez zmian. STATUS: zgodne ze
#     sterownikiem Helteca, JESZCZE nie flashowane na fizycznym R8. Jak wstanie
#     i nic nie słyszy przy dobrym RSSI — pierwszy podejrzany fem_pa_pin.

substitutions:
  devicename: esphome-wmbus-heltec-v4r8
  friendly_name: "wMBus Bridge Heltec V4-R8"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

psram:
  mode: octal  # V4-R8 = ESP32-S3R8, 8 MB octal PSRAM (V4.2 was quad/2 MB)

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  # EN: plain MQTT on 1883; don't enable TLS unless your broker has a valid cert
  #     (a wrong/unknown cert blocks the ESP from connecting).
  # PL: zwykłe MQTT na 1883; nie włączaj TLS bez pewności co do certu brokera
  #     (zły/nieznany cert blokuje połączenie ESP).
  port: 1883
  skip_cert_cn_check: true

api:
ota:
  - platform: esphome
mdns:
  disabled: false
improv_serial:
time:
  - platform: homeassistant

# Optional basic ESP diagnostics.
debug:

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# Optional status LED on Heltec V4-R8, active-low.
# NOTE: on R8 the LED moved to GPIO46 (on V4.2 it was GPIO35). GPIO46 is exactly
# the pin that used to be FEM_PA on V4.2 — which is why fem_pa_pin below is GPIO5.
output:
  - platform: gpio
    id: led_output
    pin:
      number: GPIO46
      inverted: true

light:
  - platform: binary
    id: status_led
    name: "LED"
    output: led_output
    restore_mode: ALWAYS_OFF

script:
  - id: blink_led
    mode: single
    then:
      - light.turn_on: status_led
      - delay: 50ms
      - light.turn_off: status_led

wmbus_radio:
  # ─────────────────────────────────────────────────────────────────────────
  # EN: REQUIRED here: radio_type, the board pins (cs/reset/busy/irq), has_tcxo
  #     where the module has a TCXO, and listen_mode. Everything else below is
  #     OPTIONAL — sane defaults apply if you delete it.
  # PL: WYMAGANE tutaj: radio_type, piny płytki (cs/reset/busy/irq), has_tcxo gdy
  #     moduł ma TCXO, oraz listen_mode. Cała reszta poniżej jest OPCJONALNA.
  # ─────────────────────────────────────────────────────────────────────────
  radio_type: SX1262
  cs_pin: GPIO8
  reset_pin: GPIO12
  busy_pin: GPIO13
  irq_pin:
    number: GPIO14
    mode: input

  # Heltec V4-R8 external FEM/LNA pins (KCT8103L).
  # EN: POWER=7, CSD=2, CTX=5 per Heltec board-config.h (WIFI_LORA_32_V4_R8).
  #     RX levels (radio.c RadioRx): POWER=HIGH, CSD=HIGH, CTX=LOW — which is
  #     exactly what the driver sets (fem_en/fem_ctrl HIGH, fem_pa LOW).
  # PL: POWER=7, CSD=2, CTX=5 wg board-config.h Helteca (WIFI_LORA_32_V4_R8).
  #     Poziomy RX: POWER=HIGH, CSD=HIGH, CTX=LOW — dokładnie to, co ustawia
  #     sterownik (fem_en/fem_ctrl HIGH, fem_pa LOW).
  fem_en_pin: GPIO2     # KCT8103L CSD (unchanged vs V4.2)
  fem_ctrl_pin: GPIO7   # FEM power / VFEM (unchanged vs V4.2)
  fem_pa_pin: GPIO5     # KCT8103L CTX — was GPIO46 (GC1109 TX_EN) on V4.2

  dio2_rf_switch: true
  has_tcxo: true
  rx_gain: boosted
  long_gfsk_packets: true

  # EN: Receive mode. Available values: t1, c1, both, s1.
  # PL: Tryb odbioru. Dostępne wartości: t1, c1, both, s1.
  listen_mode: t1
  listen_mode_filter_after_parse: false

  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  on_frame:
    then:
      - script.execute: blink_led
