# =============================================================================
#  ESPHome – wM-Bus Bridge (RAW-only)
#  Pełny przykład konfiguracji z komentarzami / Full configuration example
#
#  Radio: Heltec WiFi LoRa 32 V4 (ESP32-S3 + SX1262)
#  Projekt: https://github.com/Kustonium/esphome-wmbus-bridge-rawonly
# =============================================================================

# -----------------------------------------------------------------------------
# SUBSTITUTIONS – zmienne globalne / global variables
# Zmień devicename na własny, reszta jest opcjonalna.
# Change devicename to your own; the rest is optional.
# -----------------------------------------------------------------------------
substitutions:
  devicename: esphome-wmbus-heltec
  friendly_name: "wMBus Bridge Heltec V4"

# -----------------------------------------------------------------------------
# ESPHOME CORE
# -----------------------------------------------------------------------------
esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3      # wymagana wersja ESPHome / required ESPHome version
  name_add_mac_suffix: false  # true = dodaje sufiks MAC do nazwy (wiele urządzeń)
                               # true = adds MAC suffix to name (multiple devices)

# -----------------------------------------------------------------------------
# PLATFORMA – ESP32-S3 (Heltec V4)
# Dla zwykłego ESP32 zmień na: variant: esp32, flash_size: 4MB, usuń psram
# For plain ESP32: variant: esp32, flash_size: 4MB, remove psram block
# -----------------------------------------------------------------------------
esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf             # wymagane / required (Arduino nie jest wspierane)

# PSRAM – tylko ESP32-S3 z PSRAM (np. Heltec V4)
# Jeśli płytka nie ma PSRAM – usuń ten blok
# Only for ESP32-S3 boards with PSRAM (e.g. Heltec V4)
# If your board has no PSRAM – remove this block
psram:
  mode: quad

# -----------------------------------------------------------------------------
# ZEWNĘTRZNY KOMPONENT / EXTERNAL COMPONENT
# -----------------------------------------------------------------------------
external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s               # 0s = zawsze używaj cache / always use cache
                               # np. 1d = sprawdzaj raz dziennie / e.g. 1d = check daily

# -----------------------------------------------------------------------------
# LOGGER
# Poziomy / levels: DEBUG < INFO < WARN < ERROR < NONE
# -----------------------------------------------------------------------------
logger:
  level: info
  logs:
    mqtt: warn
    component: warn

# -----------------------------------------------------------------------------
# SIEĆ / NETWORK
# -----------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mdns:
  disabled: false

api:

ota:
  - platform: esphome

improv_serial:

time:
  - platform: homeassistant

# -----------------------------------------------------------------------------
# MQTT BROKER
# -----------------------------------------------------------------------------
mqtt:
  broker: 192.168.1.10
  username: !secret mqtt_user
  password: !secret mqtt_password
  log_topic:
    topic: "${devicename}/debug"
    level: DEBUG

# =============================================================================
#  DIAGNOSTYKA ESP / ESP DIAGNOSTICS
# =============================================================================
debug:

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    min_free:
      name: "Heap Min Free"
    loop_time:
      name: "Loop Time"
    psram:
      name: "Free PSRAM"
    cpu_frequency:
      name: "CPU Frequency"
  - platform: internal_temperature
    name: "MCU Temperature"
    update_interval: 60s
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

text_sensor:
  - platform: uptime
    name: "Uptime"
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"
    bssid:
      name: "WiFi BSSID"

# -----------------------------------------------------------------------------
# SPI BUS – Heltec V4: CLK=9, MOSI=10, MISO=11
# -----------------------------------------------------------------------------
spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# =============================================================================
#  LED STATUSU / STATUS LED – Heltec WiFi LoRa 32 V4
#
#  Biała dioda (GPIO35) miga przy każdym odebranym telgramie wMBus.
#  White LED (GPIO35) blinks on every received wMBus telegram.
#
#  LED jest aktywne-niskie (inverted: true).
#  LED is active-low (inverted: true).
#
#  script: blink_led z mode: single zapobiega nakładaniu się mignięć.
#  script: blink_led with mode: single prevents blink overlap.
# =============================================================================
output:
  - platform: gpio
    id: led_output
    pin:
      number: GPIO35
      inverted: true

light:
  - platform: binary
    name: "LED"
    output: led_output
    id: status_led
    restore_mode: ALWAYS_OFF

script:
  - id: blink_led
    mode: single
    then:
      - light.turn_on:
          id: status_led
      - delay: 50ms
      - light.turn_off:
          id: status_led

# =============================================================================
#  WMBUS RADIO – główna konfiguracja / main configuration
# =============================================================================
wmbus_radio:

  # ---------------------------------------------------------------------------
  # TYP RADIA / RADIO TYPE  [wymagane / required]
  # ---------------------------------------------------------------------------
  radio_type: SX1262

  # ---------------------------------------------------------------------------
  # PINY RADIA / RADIO PINS  [wymagane / required]
  # ---------------------------------------------------------------------------
  cs_pin: GPIO8
  reset_pin: GPIO12
  irq_pin:
    number: GPIO14
    mode: input

  busy_pin: GPIO13            # BUSY pin (zalecany dla SX1262 / recommended for SX1262)

  # ---------------------------------------------------------------------------
  # PINY FEM / FEM PINS  [tylko Heltec V4 / Heltec V4 only]
  #
  # fem_en_pin:   LNA enable  (GPIO2)  → HIGH = LNA włączone / LNA on
  # fem_ctrl_pin: RX path     (GPIO7)  → HIGH = tryb RX / RX mode
  # fem_pa_pin:   PA enable   (GPIO46) → LOW  = PA wyłączone (tylko RX / RX only)
  #
  # Jeśli nie masz Heltec V4 – usuń te trzy linie.
  # If you don't have Heltec V4 – remove these three lines.
  # ---------------------------------------------------------------------------
  fem_en_pin: GPIO2
  fem_ctrl_pin: GPIO7
  fem_pa_pin: GPIO46

  dio2_rf_switch: true        # DIO2 jako wewnętrzny przełącznik RF / internal RF switch
  has_tcxo: true              # Heltec V4 ma TCXO / Heltec V4 has TCXO
  rx_gain: boosted            # lepsza czułość / better sensitivity

  # ---------------------------------------------------------------------------
  # DŁUGIE PAKIETY GFSK / LONG GFSK PACKETS  (Semtech AN1200.53)
  #
  # true  = tryb AN1200.53: strumieniowanie z bufora kołowego, brak limitu ~255B
  # false = tryb standardowy (limit ~255 bajtów)
  #
  # Włącz gdy masz długie telegramy T1 (>255B po decode) lub dużo dropów.
  # Enable for long T1 telegrams (>255B after decode) or many drops.
  # ---------------------------------------------------------------------------
  long_gfsk_packets: true

  # ---------------------------------------------------------------------------
  # TRYB NASŁUCHU / LISTEN MODE
  #
  # t1   = tylko T1 (najczęstszy tryb w Polsce / most common in Poland)
  # c1   = tylko C1
  # both = T1+C1 (3:1 bias na T1) — koszt ~20-37% skuteczności na szybkich licznikach
  #
  # Uwaga: tryb both na jednym urządzeniu ma realny koszt.
  # Przy środowisku mieszanym T1/C1 rozważ dwa osobne urządzenia.
  #
  # t1   = T1 only (most common in Poland)
  # c1   = C1 only
  # both = T1+C1 (3:1 bias towards T1) — ~20-37% cost on fast meters
  #
  # Note: both mode on one device has a real reception cost.
  # For mixed T1/C1 environments consider two separate devices.
  # ---------------------------------------------------------------------------
  listen_mode: t1             # domyślnie: both / default: both

  # ---------------------------------------------------------------------------
  # BŁĘDY RADIA PRZY STARCIE / RADIO ERRORS AT BOOT  (SX1262, opcjonalne)
  # ---------------------------------------------------------------------------
  clear_device_errors_on_boot: true
  publish_dev_err_after_clear: true

  # ---------------------------------------------------------------------------
  # PODŚWIETLANIE I STATYSTYKI PER-LICZNIK / HIGHLIGHTING AND PER-METER STATS
  #
  # Wyróżnia wybrane liczniki w logach i śledzi statystyki odbioru.
  # Statystyki publikowane na MQTT co 10 pakietów i co 15 minut.
  # Topic: {diagnostic_topic}/meter/{id}/{mode}/window/{trigger}
  #
  # Highlights selected meters in logs and tracks reception statistics.
  # Stats published to MQTT every 10 packets and every 15 minutes.
  # Topic: {diagnostic_topic}/meter/{id}/{mode}/window/{trigger}
  # ---------------------------------------------------------------------------
  highlight_meters:
    - "12345678"             # przykładowy licznik / example meter ID
    # - "87654321"
  highlight_ansi: true
  highlight_tag: "wmbus_user"
  highlight_prefix: "★ "

  # ---------------------------------------------------------------------------
  # DIAGNOSTYKA – MQTT / DIAGNOSTICS – MQTT
  # ---------------------------------------------------------------------------
  diagnostic_topic: "wmbus/heltec/diag"
  diagnostic_summary_interval: 120s
  diagnostic_publish_summary_15min: true
  diagnostic_publish_summary_60min: false
# summary topics: <diagnostic_topic>/summary, /summary_15min, /summary_60min
  diagnostic_verbose: false
  diagnostic_publish_summary: true
  diagnostic_publish_drop_events: true
  diagnostic_publish_rx_path_events: false
  diagnostic_publish_highlight_only: true
  diagnostic_publish_raw: false

  # Główna publikacja RAW do wmbusmeters / Main RAW publish to wmbusmeters
  telegram_topic: "wmbus_bridge/heltec/telegram"

  # ---------------------------------------------------------------------------
  # ON_FRAME – opcjonalny callback dla dodatków / optional callback for extras
  #
  # Dostępne metody / Available methods:
  #   frame->as_hex()       → HEX po usunięciu CRC (dla własnej logiki)
  #   frame->as_raw()       → vector<uint8_t> surowych bajtów
  #   frame->as_rtlwmbus()  → format rtl-wmbus: T1;1;1;timestamp;rssi;hex
  #   frame->rssi()         → int8_t RSSI w dBm
  #   frame->link_mode()    → LinkMode (T1 lub C1)
  #   frame->format()       → std::string ("A" lub "B")
  # ---------------------------------------------------------------------------
  on_frame:
    mark_as_handled: true
    then:

      # Miganie LED przy każdym telegramie / LED blink on every telegram
      - script.execute: blink_led

      # Opcjonalnie: RSSI na osobnym topicu / Optional: RSSI on separate topic
      # - mqtt.publish:
      #     topic: "wmbus_bridge/rssi"
      #     payload: !lambda |-
      #       return to_string((int) frame->rssi());

      # Opcjonalnie: format rtl-wmbus / Optional: rtl-wmbus format
      # - mqtt.publish:
      #     topic: "wmbus_bridge/rtlwmbus"
      #     payload: !lambda |-
      #       return frame->as_rtlwmbus();
