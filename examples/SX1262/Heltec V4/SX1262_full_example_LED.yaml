substitutions:
  devicename: esphome-wmbus-heltec-v4
  friendly_name: "wMBus Bridge Heltec V4"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

psram:
  mode: quad

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
improv_serial:
time:
  - platform: homeassistant

debug:

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# Optional status LED on Heltec V4, active-low.
output:
  - platform: gpio
    id: led_output
    pin:
      number: GPIO35
      inverted: true

light:
  - platform: binary
    id: status_led
    name: "LED"
    output: led_output
    restore_mode: ALWAYS_OFF

script:
  - id: blink_led
    mode: single
    then:
      - light.turn_on: status_led
      - delay: 50ms
      - light.turn_off: status_led

wmbus_radio:
  radio_type: SX1262
  cs_pin: GPIO8
  reset_pin: GPIO12
  irq_pin:
    number: GPIO14
    mode: input
  busy_pin: GPIO13

  # Heltec V4 external FEM/LNA pins.
  fem_en_pin: GPIO2
  fem_ctrl_pin: GPIO7
  fem_pa_pin: GPIO46

  dio2_rf_switch: true
  has_tcxo: true
  rx_gain: boosted
  long_gfsk_packets: true
  listen_mode: t1

  # Main validated telegram HEX stream for wmbusmeters / HA add-on.
  telegram_topic: "wmbus_bridge/heltec_v4/telegram"

  # Lightweight MQTT diagnostics. Use `medium` or `full` only while debugging.
  diagnostic_mode: low
  diagnostic_topic: "wmbus/heltec_v4/diag"
  diagnostic_summary_interval: 60s

  # Optional SX1262 boot diagnostics.
  # clear_device_errors_on_boot: true
  # publish_dev_err_after_clear: true

  # Optional highlighted meter logs and per-meter windows.
  # highlight_meters:
  #   - "12345678"
  # highlight_ansi: true
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # diagnostic_publish_summary_highlight_meters: true

  # Optional extra windows and packet-level diagnostics.
  # diagnostic_publish_summary_15min: true
  # diagnostic_publish_summary_60min: true
  # diagnostic_publish_drop_events: true
  # diagnostic_publish_rx_path_events: false
  # diagnostic_publish_highlight_only: true
  # diagnostic_publish_raw: false

  on_frame:
    then:
      - script.execute: blink_led
