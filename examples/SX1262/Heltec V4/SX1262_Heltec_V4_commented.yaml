# ESPHome wM-Bus Bridge RAW-only — Heltec WiFi LoRa 32 V4 / SX1262
# EN: Commented example with optional LED blink and Heltec V4 FEM pins.
# PL: Przykład z komentarzami, opcjonalnym LED i pinami FEM Heltec V4.

substitutions:
  devicename: esphome-wmbus-heltec-v4
  friendly_name: "wMBus Bridge Heltec V4"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  name_add_mac_suffix: false

esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

psram:
  mode: quad

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  # EN: plain MQTT on 1883; don't enable TLS unless your broker has a valid cert
  #     (a wrong/unknown cert blocks the ESP from connecting).
  # PL: zwykłe MQTT na 1883; nie włączaj TLS bez pewności co do certu brokera
  #     (zły/nieznany cert blokuje połączenie ESP).
  port: 1883
  skip_cert_cn_check: true

api:
ota:
  - platform: esphome
mdns:
  disabled: false
improv_serial:
time:
  - platform: homeassistant

# Optional basic ESP diagnostics.
debug:

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# Optional status LED on Heltec V4, active-low.
output:
  - platform: gpio
    id: led_output
    pin:
      number: GPIO35
      inverted: true

light:
  - platform: binary
    id: status_led
    name: "LED"
    output: led_output
    restore_mode: ALWAYS_OFF

script:
  - id: blink_led
    mode: single
    then:
      - light.turn_on: status_led
      - delay: 50ms
      - light.turn_off: status_led

wmbus_radio:
  # ─────────────────────────────────────────────────────────────────────────
  # EN: REQUIRED here: radio_type, the board pins (cs/reset/busy/irq — or
  #     gdo0/gdo2 + cc1101_allow_experimental for CC1101), has_tcxo where the
  #     module has a TCXO, and listen_mode. Everything else below is OPTIONAL —
  #     sane defaults apply if you delete it: frequency, rx_gain,
  #     long_gfsk_packets, listen_mode_filter_after_parse, topic_name,
  #     diagnostic_* and highlight_meters.
  # PL: WYMAGANE tutaj: radio_type, piny płytki (cs/reset/busy/irq — lub
  #     gdo0/gdo2 + cc1101_allow_experimental dla CC1101), has_tcxo gdy moduł ma
  #     TCXO, oraz listen_mode. Cała reszta poniżej jest OPCJONALNA — po
  #     usunięciu działają sensowne domyślne: frequency, rx_gain,
  #     long_gfsk_packets, listen_mode_filter_after_parse, topic_name,
  #     diagnostic_* oraz highlight_meters.
  # ─────────────────────────────────────────────────────────────────────────
  radio_type: SX1262
  cs_pin: GPIO8
  reset_pin: GPIO12
  busy_pin: GPIO13
  irq_pin:
    number: GPIO14
    mode: input

  # Heltec V4 external FEM/LNA pins.
  fem_en_pin: GPIO2
  fem_ctrl_pin: GPIO7
  fem_pa_pin: GPIO46

  dio2_rf_switch: true
  has_tcxo: true
  rx_gain: boosted
  long_gfsk_packets: true

  # EN: Receive mode. Available values: t1, c1, both, s1.
  #     both means T1/C1 only. S1 is separate and cannot be combined with T1/C1.
  #     Default frequency: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Optional frequency override example for S1 compatibility tests:
  #       frequency: 868.36
  # PL: Tryb odbioru. Dostępne wartości: t1, c1, both, s1.
  #     both oznacza tylko T1/C1. S1 jest osobny i nie łączy się z T1/C1.
  #     Domyślna częstotliwość: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Przykład opcjonalnego nadpisania częstotliwości dla testów S1:
  #       frequency: 868.36
  listen_mode: t1
  listen_mode_filter_after_parse: false

  # MQTT topics are generated automatically.
  # topic_name is optional; if omitted, esphome.name is used.
  # Generated topics:
  #   wmbus/<topic_name>/telegram
  #   wmbus/<topic_name>/diag/...
  # topic_name: "${devicename}"


  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  # Optional SX1262 boot diagnostics.
  # clear_device_errors_on_boot: true
  # publish_dev_err_after_clear: true

  # Optional 15-minute per-meter statistics for selected IDs.
  # highlight_meters:
  #   - "00089907"
  #   - "03534159"
  # highlight_ansi: true
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # diagnostic_publish_summary_15min: true

  # Optional experimental/aggressive parser-side filter.
  # Use only for A/B tests and compare meter_snapshot.
  # listen_mode_filter_after_parse: true

  on_frame:
    then:
      - script.execute: blink_led
