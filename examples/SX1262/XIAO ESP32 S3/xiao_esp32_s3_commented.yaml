# ESPHome wM-Bus Bridge RAW-only — XIAO ESP32-S3 + SX1262
# EN: Commented example. Use as a learning/reference config.
# PL: Przykład z komentarzami. Używaj jako baza edukacyjna/referencyjna.

substitutions:
  devicename: xiao-seed-esp-s3
  friendly_name: "wMBus Bridge XIAO ESP32-S3"

  # EN: Keep topics derived from one device name to avoid copy/paste mistakes.
  # PL: Topic wyprowadzamy z jednej nazwy urządzenia, żeby uniknąć błędów copy/paste.

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3

  # EN: This particular XIAO SX1262 build uses GPIO38 to enable RF switch power.
  # PL: Ten wariant XIAO + SX1262 używa GPIO38 do włączenia zasilania toru RF.
  on_boot:
    priority: 900
    then:
      - output.turn_on: lora_rf_sw

esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
time:
  - platform: homeassistant

button:
  - platform: restart
    name: "XIAO ESP32-S3 restart"

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"

output:
  - platform: gpio
    id: lora_rf_sw
    pin: GPIO38

spi:
  clk_pin: GPIO7
  miso_pin: GPIO8
  mosi_pin: GPIO9

wmbus_radio:
  radio_type: SX1262

  cs_pin: GPIO41
  reset_pin: GPIO42
  busy_pin: GPIO40
  irq_pin:
    number: GPIO39
    mode: input

  has_tcxo: true
  rx_gain: boosted
  long_gfsk_packets: true

  # EN: Receive mode. Available values: t1, c1, both, s1.
  #     both means T1/C1 only. S1 is separate and cannot be combined with T1/C1.
  #     Default frequency: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Optional frequency override example for S1 compatibility tests:
  #       frequency: 868.36
  # PL: Tryb odbioru. Dostępne wartości: t1, c1, both, s1.
  #     both oznacza tylko T1/C1. S1 jest osobny i nie łączy się z T1/C1.
  #     Domyślna częstotliwość: T1/C1/both = 868.950 MHz, S1 = 868.300 MHz.
  #     Przykład opcjonalnego nadpisania częstotliwości dla testów S1:
  #       frequency: 868.36
  listen_mode: t1

  # EN: Stable default. Use true only for A/B testing with meter_snapshot.
  # PL: Stabilny domyślny tryb. true testuj tylko A/B przez meter_snapshot.
  listen_mode_filter_after_parse: false

  # MQTT topics are generated automatically.
  # topic_name is optional; if omitted, esphome.name is used.
  # Generated topics:
  #   wmbus/<topic_name>/telegram
  #   wmbus/<topic_name>/diag/...
  # topic_name: "${devicename}"

  # EN: Main validated telegram stream for the HA add-on / wmbusmeters.
  # PL: Główny strumień zweryfikowanych telegramów dla dodatku HA / wmbusmeters.

  # EN: Lightweight diagnostics. Use explicit topic to keep devices separated.
  # PL: Lekka diagnostyka. Jawny topic rozdziela urządzenia.
  diagnostic_mode: normal
  diagnostic_summary_interval: 60s

  # EN: Optional 15-minute per-meter statistics for selected IDs.
  # PL: Opcjonalne 15-minutowe statystyki per licznik dla wybranych ID.
  # highlight_meters:
  #   - "00089907"
  #   - "03534159"
  #   - "03528221"
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # highlight_ansi: true
  # diagnostic_publish_summary_15min: true

  # EN: This only filters detailed diagnostic events to highlighted IDs.
  # It does NOT enable meter statistics by itself.
  # PL: To tylko filtruje szczegółowe eventy diagnostyczne do highlightów.
  # Samo w sobie NIE włącza statystyk liczników.

  # EN: Increase only if logs show receiver task stack problems.
  # PL: Zwiększaj tylko, gdy logi pokazują problem ze stosem taska odbiornika.
  # receiver_task_stack_size: 6144
