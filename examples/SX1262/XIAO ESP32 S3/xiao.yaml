substitutions:
  devicename: xiao-seed-esp-s3
  friendly_name: "wMBus Bridge XIAO ESP32-S3"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3
  on_boot:
    priority: 900
    then:
      - output.turn_on: lora_rf_sw

esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf

external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s

logger:
  level: info
  logs:
    mqtt: warn
    component: warn

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password

api:
ota:
  - platform: esphome
mdns:
  disabled: false
time:
  - platform: homeassistant

button:
  - platform: restart
    name: "XIAO ESP32-S3 restart"

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"

# RF switch power enable used by this XIAO SX1262 build.
output:
  - platform: gpio
    id: lora_rf_sw
    pin: GPIO38

spi:
  clk_pin: GPIO7
  miso_pin: GPIO8
  mosi_pin: GPIO9

wmbus_radio:
  radio_type: SX1262
  cs_pin: GPIO41
  reset_pin: GPIO42
  busy_pin: GPIO40
  irq_pin:
    number: GPIO39
    mode: input

  has_tcxo: true
  rx_gain: boosted
  long_gfsk_packets: true
  listen_mode: t1
  telegram_topic: "wmbus_bridge/xiao_s3/telegram"

  diagnostic_mode: low
  diagnostic_topic: "wmbus/xiao_s3/diag"

  # Optional: increase only if logs show receiver task stack issues.
  # receiver_task_stack_size: 6144

  # Optional highlighted meter logs.
  # highlight_meters:
  #   - "12345678"
  # highlight_tag: "wmbus_user"
  # highlight_prefix: "★ "
  # highlight_ansi: true
  # diagnostic_publish_summary_highlight_meters: true
